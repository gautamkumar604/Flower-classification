services:
  - type: web
    name: flower-classification
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production

  - type: static-site
    name: flower-classification-frontend
    runtime: node
    rootDir: .
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: YOUR_BACKEND_URL_HERE