services:
  - type: web
    name: flower-classification-api
    env: python
    pythonVersion: 3.10
    rootDir: backend
    buildCommand: bash -lc "cd backend && pip install -r requirements.txt"
    startCommand: bash -lc "cd backend && gunicorn app:app"
    envVars:
      - key: FLASK_ENV
        value: production